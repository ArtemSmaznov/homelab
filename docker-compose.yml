x-default: &service_default
  tty: true # enable colorized logs
  restart: unless-stopped

x-redis: &redis
  <<: *service_default
  image: redis:alpine

x-mariadb: &mariadb
  <<: *service_default
  image: mariadb:lts
  healthcheck:
    test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
    start_period: 10s
    interval: 10s
    timeout: 5s
    retries: 3

networks:
  ai:
  calibre:
  hass:
    ipam:
      config:
        - subnet: 172.11.0.0/24
  immich:
  monitor:
  music:
  nextcloud:
  pricebuddy:
  proxy-tier:
    ipam:
      config:
        - subnet: 172.10.0.0/24
  vpn:
  webtrees:

secrets:
  db_password:
    file: secrets/db_password
  db_root_password:
    file: secrets/db_root_password
  immich_db_password:
    file: secrets/immich/db_password
  webtrees_password:
    file: secrets/webtrees/password
  webtrees_db_password:
    file: secrets/webtrees/db_password
  webtrees_db_root_password:
    file: secrets/webtrees/db_root_password
  transmission_password:
    file: secrets/transmission_password
  openvpn_creds:
    file: secrets/vpn_creds
  rpc_creds:
    file: secrets/transmission_creds
  digikam_db_password:
    file: secrets/digikam/db_password
  digikam_db_root_password:
    file: secrets/digikam/db_root_password
  pricebuddy_db_password:
    file: secrets/pricebuddy/db_password
  pricebuddy_db_root_password:
    file: secrets/pricebuddy/db_root_password

services:

  db_digikam:
    container_name: db_digikam
    <<: *mariadb
    command: --max_allowed_packet=128M --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    ports:
      - ${DIGIKAM_PORT}:3306
    volumes:
      - ${MYSQL_DIR}/digikam:/var/lib/mysql
    environment:
      # application
      MARIADB_DATABASE: ${DIGIKAM_DB_NAME}
      MARIADB_USER: ${DIGIKAM_DB_USER}
      MARIADB_PASSWORD_FILE: /run/secrets/digikam_db_password
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/digikam_db_root_password
    secrets:
      - digikam_db_password
      - digikam_db_root_password

  db_immich:
    container_name: db_immich
    <<: *service_default
    image: ghcr.io/immich-app/postgres:14-vectorchord0.3.0-pgvectors0.2.0
    volumes:
      - ${POSTGRESQL_DIR}/immich:/var/lib/postgresql/data
    environment:
      # application
      POSTGRES_DB: ${IMMICH_DB_NAME}
      POSTGRES_USER: ${IMMICH_DB_USER}
      POSTGRES_PASSWORD: /run/secrets/immich_db_password
      POSTGRES_INITDB_ARGS: "--data-checksums"
      # Uncomment the DB_STORAGE_TYPE: 'HDD' var if your database isn't stored on SSDs
      DB_STORAGE_TYPE: "HDD"
    secrets:
      - immich_db_password
    networks:
      - immich

  influxdb:
    container_name: influxdb
    depends_on:
      - hass
    <<: *service_default
    image: influxdb:${INFLUXDB_VERSION}
    ports:
      - ${INFLUXDB_LOCAL_PORT}:8086
    volumes:
      - ${VOLUMES_DIR}/grafana/influxdb:/var/lib/influxdb2
    networks:
      - monitor
      - hass

  db_nextcloud:
    container_name: db_nextcloud
    <<: *mariadb
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    volumes:
      - ${VOLUMES_DIR}/nextcloud/db:/var/lib/mysql
    environment:
      # application
      MARIADB_AUTO_UPGRADE: 1
      MARIADB_DISABLE_UPGRADE_BACKUP: 1
      MYSQL_DATABASE: ${NEXTCLOUD_DB_NAME}
      MYSQL_USER: ${NEXTCLOUD_DB_USER}
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
    secrets:
      - db_password
      - db_root_password
    networks:
      - nextcloud

  db_pricebuddy:
    container_name: db_pricebuddy
    <<: *mariadb
    volumes:
      - ${MYSQL_DIR}/pricebuddy:/var/lib/mysql
    environment:
      # application
      MARIADB_DATABASE: ${PRICEBUDDY_DB_NAME}
      MARIADB_USER: ${PRICEBUDDY_DB_USER}
      MARIADB_PASSWORD_FILE: /run/secrets/pricebuddy_db_password
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/pricebuddy_db_root_password
    secrets:
      - pricebuddy_db_password
      - pricebuddy_db_root_password
    networks:
      - pricebuddy

  db_webtrees:
    container_name: db_webtrees
    <<: *mariadb
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    volumes:
      - ${VOLUMES_DIR}/webtrees/db:/var/lib/mysql
    environment:
      # application
      MARIADB_AUTO_UPGRADE: 1
      MARIADB_DISABLE_UPGRADE_BACKUP: 1
      MARIADB_DATABASE: ${WEBTREES_DB_NAME}
      MARIADB_USER: ${WEBTREES_DB_USER}
      MARIADB_PASSWORD_FILE: /run/secrets/webtrees_db_password
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/webtrees_db_root_password
    secrets:
      - webtrees_db_password
      - webtrees_db_root_password
    networks:
      - webtrees

  redis_immich:
    <<: *redis
    container_name: redis_immich
    networks:
      - immich

  redis_nextcloud:
    <<: *redis
    container_name: redis_nextcloud
    networks:
      - nextcloud

  proxy:
    build: ./proxy
    container_name: reverse-proxy
    hostname: reverse-proxy
    tty: true # enable colorized logs
    restart: always
    ports:
      - 80:80
      - 443:443
    volumes:
      - ${VOLUMES_DIR}/proxy/certs:/etc/nginx/certs:ro
      - ${VOLUMES_DIR}/proxy/vhost.d:/etc/nginx/vhost.d
      - ${VOLUMES_DIR}/proxy/html:/usr/share/nginx/html
      - /var/run/docker.sock:/tmp/docker.sock:ro
    labels:
      com.github.jrcs.letsencrypt_nginx_proxy_companion.nginx_proxy: "true"
    networks:
      - proxy-tier

  acme:
    <<: *service_default
    image: nginxproxy/acme-companion:${ACME_VERSION}
    container_name: acme
    hostname: acme
    restart: always
    depends_on:
      - proxy
    volumes:
      - ${VOLUMES_DIR}/proxy/certs:/etc/nginx/certs
      - ${VOLUMES_DIR}/proxy/acme:/etc/acme.sh
      - ${VOLUMES_DIR}/proxy/vhost.d:/etc/nginx/vhost.d
      - ${VOLUMES_DIR}/proxy/html:/usr/share/nginx/html
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # app
      DEFAULT_EMAIL: ${MY_EMAIL}
    networks:
      - proxy-tier

  ddclient:
    <<: *service_default
    image: lscr.io/linuxserver/ddclient:${DD_VERSION}
    container_name: ddclient
    hostname: ddclient
    volumes:
      - ${VOLUMES_DIR}/dns:/config
    environment:
      # app
      PUID: ${UID}
      PGID: ${GID}
      TZ: ${TIME_ZONE}

  transmission:
    <<: *service_default
    image: haugene/transmission-openvpn:${TRANSMISSION_VERSION}
    container_name: transmission
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    ports:
      - ${TRANSMISSION_WEBUI_PORT}:9091/tcp
    volumes:
      - ${VOLUMES_DIR}/transmission/config:/config/transmission-home
      - ${DOWNLOADS_DIR}:/downloads
      - ${DOWNLOADS_DIR}/.watch:/watch
      - ${VIDEOS_DIR}:/downloads/videos
    environment:
      # proxy
      VIRTUAL_HOST: ${TRANSMISSION_HOST}
      VIRTUAL_PORT: ${TRANSMISSION_WEBUI_PORT}
      LETSENCRYPT_HOST: ${TRANSMISSION_HOST}
      LETSENCRYPT_EMAIL: ${MY_EMAIL}

      # app
      LOCAL_NETWORK: 192.168.0.0/16
      #LOCAL_NETWORK: 172.10.0.0/24
      TRANSMISSION_DOWNLOAD_DIR: /downloads
      TRANSMISSION_INCOMPLETE_DIR: /downloads/.incomplete
      TRANSMISSION_RPC_PORT: ${TRANSMISSION_WEBUI_PORT}
      PUID: ${UID}
      PGID: ${GID}
      TZ: ${TIME_ZONE}
      HEALTH_CHECK_HOST: archlinux.org
    env_file:
      - secrets/vpn.env
    secrets:
      - rpc_creds
      - openvpn_creds
    networks:
      - proxy-tier
      - hass

  home:
    <<: *service_default
    image: linuxserver/heimdall:${HOME_VERSION}
    container_name: home
    volumes:
      - ${VOLUMES_DIR}/heimdall:/config/www
    environment:
      # proxy
      VIRTUAL_HOST: ${HOME_HOST}
      VIRTUAL_PORT: 443
      VIRTUAL_PROTO: https
      LETSENCRYPT_HOST: ${HOME_HOST}
      LETSENCRYPT_EMAIL: ${MY_EMAIL}

      # app
      PUID: ${UID}
      PGID: ${GID}
      TZ: ${TIME_ZONE}
    networks:
      - proxy-tier

  grafana:
    <<: *service_default
    image: grafana/grafana-oss:${GRAFANA_VERSION:-preview}
    container_name: grafana
    hostname: grafana
    user: "${UID}"
    ports:
      - ${GRAFANA_LOCAL_PORT}:3000
    volumes:
      - ${VOLUMES_DIR}/grafana/app:/var/lib/grafana
    environment:
      # proxy
      VIRTUAL_HOST: ${GRAFANA_HOST}
      VIRTUAL_PORT: 3000
      LETSENCRYPT_HOST: ${GRAFANA_HOST}
      LETSENCRYPT_EMAIL: ${MY_EMAIL}

      # app
      GF_SERVER_ROOT_URL: https://${GRAFANA_HOST}
      GF_SERVER_DOMAIN: ${MY_DOMAIN}

      GF_DATE_FORMATS_FULL_DATE: ddd, D MMM YYYY - h:mm:ssa
      GF_DATE_FORMATS_INTERVAL_SECOND: h:mm:ssa
      GF_DATE_FORMATS_INTERVAL_MINUTE: h:mm
      GF_DATE_FORMATS_INTERVAL_HOUR: D MMM HH:mm
      GF_DATE_FORMATS_INTERVAL_DAY: D MMM
      GF_DATE_FORMATS_INTERVAL_MONTH: MMM YYYY
      GF_DATE_FORMATS_INTERVAL_YEAR: YYYY
    networks:
      - proxy-tier
      - monitor
      - hass

  prometheus:
    <<: *service_default
    image: prom/prometheus:${PROMETHEUS_VERSION}
    container_name: prometheus
    hostname: prometheus
    user: ${UID}:${DGID}
    ports:
      - ${PROMETHEUS_LOCAL_PORT}:9090
    volumes:
      - ${VOLUMES_DIR}/prometheus/config:/etc/prometheus
      - ${VOLUMES_DIR}/prometheus/data:/prometheus
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitor

  prometheus-zfs:
    <<: *service_default
    image: matusnovak/prometheus-zfs:${PROMETHEUS_ZFS_VERSION}
    container_name: zfs
    hostname: zfs
    privileged: true
    ports:
      - ${PROMETHEUS_ZFS_LOCAL_PORT}:9901
    networks:
      - monitor

  prometheus-node-exporter:
    <<: *service_default
    image: quay.io/prometheus/node-exporter:${PROMETHEUS_NODE_EXPORTER_VERSION}
    container_name: node_exporter
    hostname: node_exporter
    command:
      - "--path.rootfs=/host"
    pid: host
    ports:
      - ${PROMETHEUS_NODE_EXPORTER_LOCAL_PORT}:9100
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitor

  prometheus-apc-exporter:
    <<: *service_default
    image: jangrewe/apcupsd-exporter:${PROMETHEUS_APC_EXPORTER_VERSION}
    container_name: apc_exporter
    hostname: apc_exporter
    depends_on:
      - apc
    command: -apcupsd.addr apc:3551
    ports:
      - ${PROMETHEUS_APC_EXPORTER_LOCAL_PORT}:9162
    networks:
      - monitor

  apc:
    <<: *service_default
    image: gregewing/apcupsd:${APC_VERSION}
    container_name: apc
    hostname: apc
    ports:
      - ${APC_LOCAL_PORT}:3551
    volumes:
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
      - /run/apcupsd:/run/apcupsd
      - ${VOLUMES_DIR}/apc:/etc/apcupsd
    devices:
      - /dev/usb/hiddev0
    environment:
      TZ: ${TIME_ZONE}
    healthcheck:
      test: ["CMD-SHELL", "apcaccess | grep -E 'ONLINE' >> /dev/null"] # Command to check health
      interval: 30s # Interval between health checks
      timeout: 5s # Timeout for each health check
      retries: 3 # How many times to retry
      start_period: 15s # Estimated time to boot
    networks:
      - hass
      - monitor

  pricebuddy:
    <<: *service_default
    image: jez500/pricebuddy:${PRICEBUDDY_VERSION}
    container_name: pricebuddy
    hostname: pricebuddy
    depends_on:
      db_pricebuddy:
        condition: service_healthy
    ports:
      - ${PRICEBUDDY_LOCAL_PORT}:80
    volumes:
      - ${VOLUMES_DIR}/pricebuddy:/app/storage
    environment:
      # application
      SCRAPER_BASE_URL: http://scraper-pricebuddy:3000

      # database
      DB_HOST: db_pricebuddy
      DB_DATABASE: ${PRICEBUDDY_DB_NAME}
      DB_USERNAME: ${PRICEBUDDY_DB_USER}
      DB_PASSWORD_FILE: /run/secrets/pricebuddy_db_password

      # proxy
      # APP_URL: ""
      # ASSET_URL: ""
    networks:
      - pricebuddy
    secrets:
      - pricebuddy_db_password
      - pricebuddy_db_root_password

  scraper-pricebuddy:
    <<: *service_default
    image: jez500/seleniumbase-scrapper:${SCRAPER_PRICEBUDDY_VERSION}
    container_name: scraper-pricebuddy
    hostname: scraper-pricebuddy
    ports:
      - ${SCRAPER_PRICEBUDDY_LOCAL_PORT}:3000
    networks:
      - pricebuddy

  hass:
    <<: *service_default
    image: ghcr.io/home-assistant/home-assistant:${HOME_ASSISTANT_VERSION}
    container_name: home-assistant
    hostname: hass
    privileged: true
    ports:
      - ${HOME_ASSISTANT_LOCAL_PORT}:8123
    volumes:
      - ${VOLUMES_DIR}/home-assistant/config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      # proxy
      VIRTUAL_HOST: ${HOME_ASSISTANT_HOST}
      VIRTUAL_PORT: 8123
      LETSENCRYPT_HOST: ${HOME_ASSISTANT_HOST}
      LETSENCRYPT_EMAIL: ${MY_EMAIL}
    networks:
      - proxy-tier
      - hass
      - monitor

  zwave-js-ui:
    <<: *service_default
    image: zwavejs/zwave-js-ui:${ZWAVE_JS_VERSION}
    container_name: zwave-js-ui
    stop_signal: SIGINT
    depends_on:
      - hass
    ports:
      - ${ZWAVE_JS_LOCAL_PORT}:3000 # port for Z-Wave JS websocket server
    volumes:
      - ${VOLUMES_DIR}/home-assistant/zwave:/usr/src/app/store
    devices:
      - /dev/serial/by-id/usb-0658_0200-if00:/dev/zwave
    environment:
      # proxy
      VIRTUAL_HOST: ${ZWAVE_JS_HOST}
      VIRTUAL_PORT: 8091
      LETSENCRYPT_HOST: ${ZWAVE_JS_HOST}
      LETSENCRYPT_EMAIL: ${MY_EMAIL}

      # app
      ZWAVEJS_EXTERNAL_CONFIG: /usr/src/app/store/.config-db
      TZ: ${TIME_ZONE}
    env_file:
      - secrets/zwave-js-ui.env
    networks:
      - hass
      - proxy-tier

  whisper:
    <<: *service_default
    image: rhasspy/wyoming-whisper:${WYOMING_WHISPER_VERSION}
    container_name: whisper
    depends_on:
      - hass
    ports:
      - 10300:10300
    volumes:
      - ${VOLUMES_DIR}/home-assistant/wyoming-whisper:/data
    command: --model=distil-small.en --language=en
    networks:
      - hass

  piper:
    <<: *service_default
    image: rhasspy/wyoming-piper:${WYOMING_PIPER_VERSION}
    container_name: piper
    depends_on:
      - hass
    ports:
      - 10200:10200
    volumes:
      - ${VOLUMES_DIR}/home-assistant/wyoming-piper:/data
    command: --voice=en_US-libritts_r-medium
    networks:
      - hass

  openwakeword:
    <<: *service_default
    image: rhasspy/wyoming-openwakeword:${WYOMING_OPENWAKEWORD_VERSION}
    container_name: openwakeword
    depends_on:
      - hass
    ports:
      - 10400:10400
    command: --preload-model=ok_nabu
    networks:
      - hass

  nextcloud-app:
    build:
      context: ./nextcloud/app
      args:
        NEXTCLOUD_VERSION: ${NEXTCLOUD_VERSION}
    container_name: nextcloud-app
    tty: true # enable colorized logs
    restart: unless-stopped
    depends_on:
      - db_nextcloud
      - redis_nextcloud
    volumes:
      - ${VOLUMES_DIR}/nextcloud/app:/var/www/html
      # - ${VOLUMES_DIR}/nextcloud/opcache-recommended.ini:/usr/local/etc/php/conf.d/opcache-recommended.ini
      - ${DOWNLOADS_DIR}:/var/www/html/data/artem/files/downloads/amadeus
      - ${MUSIC_DIR}:/var/www/html/data/artem/files/music
      - ${PICTURES_DIR}:/var/www/html/data/artem/files/pictures
      - ${PHOTOS_DIR}:/var/www/html/data/artem/files/photos
      - ${VIDEOS_DIR}:/var/www/html/data/artem/files/videos
      - type: tmpfs
        target: /tmp:exec
    environment:
      # app
      PUID: ${UID}
      PGID: ${UID}
      MYSQL_HOST: db_nextcloud
      REDIS_HOST: redis_nextcloud
      MYSQL_DATABASE: ${NEXTCLOUD_DB_NAME}
      MYSQL_USER: ${NEXTCLOUD_DB_USER}
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
      PHP_MEMORY_LIMIT: 2048M
    secrets:
      - db_password
    networks:
      - nextcloud

  nextcloud-server:
    build: ./nextcloud/server
    container_name: nextcloud-server
    hostname: nextcloud
    tty: true # enable colorized logs
    restart: unless-stopped
    depends_on:
      - nextcloud-app
    ports:
      - ${NEXTCLOUD_LOCAL_PORT}:80
    volumes:
      - ${VOLUMES_DIR}/nextcloud/app:/var/www/html:ro
    environment:
      # proxy
      VIRTUAL_HOST: ${NEXTCLOUD_HOST}
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: ${NEXTCLOUD_HOST}
      LETSENCRYPT_EMAIL: ${MY_EMAIL}
    networks:
      - proxy-tier
      - nextcloud
      - hass

  nextcloud-cron:
    <<: *service_default
    image: nextcloud:fpm-alpine
    entrypoint: /cron.sh
    container_name: nextcloud-cron
    depends_on:
      - db_nextcloud
      - redis_nextcloud
    volumes:
      - ${VOLUMES_DIR}/nextcloud/app:/var/www/html
      - ${VOLUMES_DIR}/nextcloud/cron:/var/spool/cron/crontabs
    networks:
      - nextcloud

  calibre-web-books:
    <<: *service_default
    image: lscr.io/linuxserver/calibre-web:${CALIBRE_VERSION}
    container_name: calibre-web-books
    hostname: calibre-web-books
    ports:
      - ${CALIBRE_BOOKS_LOCAL_PORT}:8083/tcp
    volumes:
      - ${VOLUMES_DIR}/calibre/books:/config
      - ${BOOKS_DIR}:/books
    environment:
      # proxy
      VIRTUAL_HOST: ${CALIBRE_BOOKS_HOST}
      VIRTUAL_PORT: 8083
      LETSENCRYPT_HOST: ${CALIBRE_BOOKS_HOST}
      LETSENCRYPT_EMAIL: ${MY_EMAIL}

      # app
      PUID: ${UID}
      PGID: ${GID}
      TZ: ${TIME_ZONE}
      DOCKER_MODS: linuxserver/mods:universal-calibre # optional & x86-64 only Adds the ability to perform ebook conversion
    networks:
      - calibre
      - proxy-tier

  calibre-web-manuals:
    <<: *service_default
    image: lscr.io/linuxserver/calibre-web:${CALIBRE_VERSION}
    container_name: calibre-web-manuals
    hostname: calibre-web-manuals
    ports:
      - ${CALIBRE_MANUALS_LOCAL_PORT}:8083/tcp
    volumes:
      - ${VOLUMES_DIR}/calibre/manuals:/config
      - ${MANUALS_DIR}:/books
    environment:
      # proxy
      VIRTUAL_HOST: ${CALIBRE_MANUALS_HOST}
      VIRTUAL_PORT: 8083
      LETSENCRYPT_HOST: ${CALIBRE_MANUALS_HOST}
      LETSENCRYPT_EMAIL: ${MY_EMAIL}

      # app
      PUID: ${UID}
      PGID: ${GID}
      TZ: ${TIME_ZONE}
      DOCKER_MODS: linuxserver/mods:universal-calibre # optional & x86-64 only Adds the ability to perform ebook conversion
    networks:
      - calibre
      - proxy-tier

  calibre:
    <<: *service_default
    image: lscr.io/linuxserver/calibre:${CALIBRE_MNG_VERSION}
    container_name: calibre
    hostname: calibre
    ports:
      - ${CALIBRE_MNG_VNC_LOCAL_PORT}:8181/tcp
      - ${CALIBRE_MNG_LOCAL_PORT}:8081/tcp
    volumes:
      - ${VOLUMES_DIR}/calibre/manager.books:/config
      - ${BOOKS_DIR}:/books
    environment:
      # app
      PUID: ${UID}
      PGID: ${GID}
      TZ: ${TIME_ZONE}
    networks:
      - calibre
      - proxy-tier

  webtrees:
    <<: *service_default
    image: nathanvaughn/webtrees:${WEBTREES_VERSION}
    container_name: webtrees
    depends_on:
      - db_webtrees
    volumes:
      - ${VOLUMES_DIR}/webtrees/data:/var/www/webtrees/data
      - ${VOLUMES_DIR}/webtrees/themes:/var/www/webtrees/modules_v4
    environment:
      # proxy
      VIRTUAL_HOST: ${WEBTREES_HOST}
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: ${WEBTREES_HOST}
      LETSENCRYPT_EMAIL: ${MY_EMAIL}

      # app
      PRETTY_URLS: true
      HTTPS: false
      HTTPS_REDIRECT: false
      LANG: en-US
      LOGIN_URL: "https://${WEBTREES_HOST}"
      SERVER_URL: "https://${WEBTREES_HOST}"
      BASE_URL: "https://${WEBTREES_HOST}"
      DB_TYPE: mysql
      DB_HOST: db_webtrees
      DB_PORT: 3306
      DB_NAME: ${WEBTREES_DB_NAME}
      DB_USER: ${WEBTREES_DB_USER}
      DB_PASS_FILE_FILE: /run/secrets/webtrees_db_password
      DB_PREFIX: wt_
      WT_NAME: ${MY_FULLNAME}
      WT_EMAIL: ${MY_EMAIL}
      WT_USER: ${MY_USERNAME}
      WT_PASS_FILE: /run/secrets/webtrees_password
    secrets:
      - webtrees_password
      - webtrees_db_password
    networks:
      - proxy-tier
      - webtrees

  navidrome:
    <<: *service_default
    image: deluan/navidrome:${NAVIDROME_VERSION}
    container_name: navidrome
    hostname: navidrome
    user: ${UID}:${GID}
    ports:
      - ${NAVIDROME_LOCAL_PORT}:4533
    volumes:
      - ${VOLUMES_DIR}/navidrome:/data
      - ${MUSIC_DIR}:/music:ro
      - ${PLAYLISTS_DIR}:/playlists
    environment:
      # proxy
      VIRTUAL_HOST: ${NAVIDROME_HOST}
      VIRTUAL_PORT: 4533
      LETSENCRYPT_HOST: ${NAVIDROME_HOST}
      LETSENCRYPT_EMAIL: ${MY_EMAIL}

      # app
      ND_CONFIGFILE: /data/navidrome.toml
      ND_LISTENBRAINZ_BASEURL: http://maloja:${MALOJA_LOCAL_PORT}/apis/listenbrainz/1
    networks:
      - proxy-tier
      - music

  maloja:
    <<: *service_default
    image: krateng/maloja:${MALOJA_VERSION}
    container_name: maloja
    hostname: maloja
    ports:
      - ${MALOJA_LOCAL_PORT}:42010
    volumes:
      - ${VOLUMES_DIR}/maloja/config:/config/config
      - ${VOLUMES_DIR}/maloja/data:/config/state
    environment:
      # app
      PUID: ${UID}
      PGID: ${GID}
      TZ: ${TIME_ZONE}
      MALOJA_LOCATION_TIMEZONE: ${TIME_ZONE}
    networks:
      - music

  immich:
    <<: *service_default
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    container_name: immich
    hostname: immich
    depends_on:
      - db_immich
      - redis_immich
    ports:
      - ${IMMICH_LOCAL_PORT}:2283
    volumes:
      - /srv/zmedia/immich:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      # proxy
      VIRTUAL_HOST: ${IMMICH_HOST}
      VIRTUAL_PORT: 2283
      LETSENCRYPT_HOST: ${IMMICH_HOST}
      LETSENCRYPT_EMAIL: ${MY_EMAIL}

      # app
      IMMICH_TELEMETRY_INCLUDE: all
      DB_DATABASE_NAME: ${IMMICH_DB_NAME}
      DB_USERNAME: ${IMMICH_DB_USER}
      DB_PASSWORD: /run/secrets/immich_db_password
      DB_HOSTNAME: db_immich
      REDIS_HOSTNAME: redis_immich
      TZ: ${TIME_ZONE}
    secrets:
      - immich_db_password
    networks:
      - proxy-tier
      - immich
      - monitor

  plex:
    <<: *service_default
    image: plexinc/pms-docker:${PLEX_VERSION}
    container_name: plex-media-server
    hostname: plex-media-server
    ports:
      - ${PLEX_LOCAL_PORT}:32400/tcp
      - 8324:8324/tcp
      - 32469:32469/tcp
      - 1900:1900/udp
      - 32410:32410/udp
      - 32412:32412/udp
      - 32413:32413/udp
      - 32414:32414/udp
    volumes:
      - ${VOLUMES_DIR}/plex/config:/config
      - ${VOLUMES_DIR}/plex/transcode:/transcode
      - ${VIDEOS_DIR}:/data/videos
      - ${MUSIC_DIR}:/data/music
    environment:
      # proxy
      VIRTUAL_HOST: ${PLEX_HOST}
      VIRTUAL_PORT: 32400
      LETSENCRYPT_HOST: ${PLEX_HOST}
      LETSENCRYPT_EMAIL: ${MY_EMAIL}

      # app
      PLEX_CLAIM:
      PLEX_UID: ${UID}
      PLEX_GID: ${GID}
      TZ: ${TIME_ZONE}
    networks:
      - proxy-tier
      - hass

  jellyfin:
    <<: *service_default
    image: jellyfin/jellyfin:${JELLYFIN_VERSION}
    container_name: jellyfin
    hostname: jellyfin
    user: ${UID}:${GID}
    ports:
      - ${JELLYFIN_LOCAL_PORT}:8096/tcp
    volumes:
      - ${VOLUMES_DIR}/jellyfin/config:/config
      - ${VOLUMES_DIR}/jellyfin/cache:/cache
      - ${VIDEOS_DIR}:/media/videos:ro
    environment:
      # proxy
      VIRTUAL_HOST: ${JELLYFIN_HOST}
      VIRTUAL_PORT: 8096
      LETSENCRYPT_HOST: ${JELLYFIN_HOST}
      LETSENCRYPT_EMAIL: ${MY_EMAIL}
    networks:
      - proxy-tier
      - hass

  asf:
    <<: *service_default
    image: justarchi/archisteamfarm:${ASF_VERSION}
    container_name: asf
    volumes:
      - ${VOLUMES_DIR}/archi-steam-farm:/app/config
    environment:
      # proxy
      VIRTUAL_HOST: ${ASF_HOST}
      VIRTUAL_PORT: 1242
      LETSENCRYPT_HOST: ${ASF_HOST}
      LETSENCRYPT_EMAIL: ${MY_EMAIL}
    networks:
      - proxy-tier

  anki:
    <<: *service_default
    image: kuklinistvan/anki-sync-server:${ANKI_VERSION}
    container_name: anki
    hostname: anki
    volumes:
      - ${VOLUMES_DIR}/anki:/app/data
    environment:
      # proxy
      VIRTUAL_HOST: ${ANKI_HOST}
      VIRTUAL_PORT: 27701
      LETSENCRYPT_HOST: ${ANKI_HOST}
      LETSENCRYPT_EMAIL: ${MY_EMAIL}
    networks:
      - proxy-tier

  find-my-device:
    <<: *service_default
    image: registry.gitlab.com/fmd-foss/fmd-server:${FMD_VERSION}
    container_name: find-my-device
    hostname: find-my-device
    ports:
      - ${FMD_LOCAL_PORT}:8080
    volumes:
      - ${VOLUMES_DIR}/find-my-device:/var/lib/fmd-server/db
    environment:
      # proxy
      VIRTUAL_HOST: ${FMD_HOST}
      VIRTUAL_PORT: 8080
      LETSENCRYPT_HOST: ${FMD_HOST}
      LETSENCRYPT_EMAIL: ${MY_EMAIL}

      # app
      TZ: ${TIME_ZONE}
    networks:
      - proxy-tier

  open_webui:
    <<: *service_default
    image: ghcr.io/open-webui/open-webui:${OPEN_WEBUI_VERSION}
    container_name: open_webui
    hostname: open_webui
    ports:
      - ${OPEN_WEBUI_LOCAL_PORT}:8080
    volumes:
      - ${AI_DIR}/open-webui:/app/backend/data
    environment:
      # proxy
      VIRTUAL_HOST: ${OPEN_WEBUI_HOST}
      VIRTUAL_PORT: 8080
      LETSENCRYPT_HOST: ${OPEN_WEBUI_HOST}
      LETSENCRYPT_EMAIL: ${MY_EMAIL}

      # app
      OLLAMA_BASE_URL: http://ollama:${OLLAMA_LOCAL_PORT}
      CORS_ALLOW_ORIGIN: ${OPEN_WEBUI_CORS_ALLOW_ORIGIN}
    networks:
      - proxy-tier
      - ai

  ollama:
    <<: *service_default
    image: ollama/ollama
    container_name: ollama
    hostname: ollama
    ports:
      - ${OLLAMA_LOCAL_PORT}:11434
    volumes:
      - ${AI_DIR}/ollama:/root/.ollama
      - ${AI_MODELS_DIR}/ollama:/root/.ollama/models
    networks:
      - hass
      - ai

  speaches:
    <<: *service_default
    build:
      platforms:
        - linux/amd64
        - linux/arm64
    image: ghcr.io/speaches-ai/speaches:latest-cpu
    container_name: speaches
    hostname: speaches
    develop:
      watch:
        - action: rebuild
          path: ./uv.lock
        - action: sync+restart
          path: ./src
          target: /home/ubuntu/speaches/src
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://0.0.0.0:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    ports:
      - ${SPEACHES_LOCAL_PORT}:8000
    volumes:
      - ${AI_MODELS_DIR}/speaches:/home/ubuntu/.cache/huggingface/hub
    networks:
      - ai

  immich-machine-learning:
    <<: *service_default
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    container_name: immich-machine-learning
    # For hardware acceleration, add one of -[armnn, cuda, openvino] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    # extends: # uncomment this section for hardware acceleration - see https://immich.app/docs/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, openvino, openvino-wsl] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    volumes:
      - ${VOLUMES_DIR}/immich/cache:/cache
    networks:
      - immich

  jenkins:
    <<: *service_default
    image: jenkins/jenkins:${JENKINS_VERSION}-${JENKINS_JAVA_VERSION}
    container_name: jenkins
    hostname: jenkins
    ports:
      - ${JENKINS_LOCAL_PORT}:8080
      - 50000:50000
    volumes:
      - ${VOLUMES_DIR}/jenkins:/var/jenkins_home
    # environment:
    #   # proxy
    #   VIRTUAL_HOST: ${JENKINS_HOST}
    #   VIRTUAL_PORT: 8080
    #   LETSENCRYPT_HOST: ${JENKINS_HOST}
    #   LETSENCRYPT_EMAIL: ${MY_EMAIL}
    # networks:
    #   - proxy-tier
